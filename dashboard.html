<!DOCTYPE html>
<html>
<head>
    <title>D&D Character Manager</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="dashboard.css">
    <link
        rel="icon"
        type="image/png"
        href="images/favicon.png">
</head>

<body onload="loadUser()">

    <div class="dashboard">

        <div class="card profile-card" onclick="location.href='profile.html'">
            <h2>ABOUT THE PROJECT</h2>
        </div>

        <div class="card character-card" onclick="location.href='character.html'">
            <h2>Characters</h2>
        </div>

        <div class="card world-card" onclick="location.href='worlds.html'">
            <h2>Worlds</h2>
        </div>

        <div class="card signout-card" onclick="logout()">
            <h2>Sign Out</h2>
        </div>

    </div>

    <script src="script.js"></script>
    <script src="auth.js"></script>

</body>
</html>
